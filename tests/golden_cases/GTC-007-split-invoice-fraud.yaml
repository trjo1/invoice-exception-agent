# Golden test case GTC-007
# Scenario: Multiple invoices reference the same PO across a short time window —
#           possible split-invoice fraud pattern.
# Expected: HITL Tier 3 (supervisor + fraud team); halt all involved invoices.

id: GTC-007
title: Split-invoice fraud pattern (multiple invoices, same PO, short window)
exception_category: fraud_signal
difficulty: high
created: 2026-05-10
notes: |
  Sophisticated fraud anchor. Pattern: vendor submits several smaller
  invoices against one PO, each below the AP approval threshold for closer
  scrutiny, totaling more than the PO authorized. Real-world risk; must be
  caught before any of them posts.

input:
  events:
    - source: SAP
      event_type: po_created
      timestamp: 2026-04-08T10:00:00Z
      payload:
        po_id: PO-2026-04-00501
        vendor_id: P002
        line_items:
          - sku: SKU-E223
            description: Pallet handling - bulk Q2
            quantity: 1
            unit_price_usd: 8500.00
            line_total_usd: 8500.00
        currency: USD
        terms: NET-45

    - source: Email
      event_type: invoice_received
      timestamp: 2026-04-25T09:00:00Z
      payload:
        from: billing@maplelogistics.example.com
        invoice_attachment: P002_INV_2026-04-25_002.pdf

    - source: Email
      event_type: invoice_received
      timestamp: 2026-04-26T11:00:00Z
      payload:
        from: billing@maplelogistics.example.com
        invoice_attachment: P002_INV_2026-04-26_001.pdf

    - source: Email
      event_type: invoice_received
      timestamp: 2026-04-27T08:00:00Z
      payload:
        from: billing@maplelogistics.example.com
        invoice_attachment: P002_INV_2026-04-27_001.pdf

  documents:
    - type: invoice_pdf
      ref: test_corpus/synthetic/invoices/P002_INV_2026-04-25_002.pdf
      ground_truth_fields:
        invoice_number: INV-2026-04-25-MAPLE-002
        po_reference: PO-2026-04-00501
        vendor_id: P002
        total_usd: 4500.00
        currency: USD

    - type: invoice_pdf
      ref: test_corpus/synthetic/invoices/P002_INV_2026-04-26_001.pdf
      ground_truth_fields:
        invoice_number: INV-2026-04-26-MAPLE-001
        po_reference: PO-2026-04-00501
        vendor_id: P002
        total_usd: 4200.00
        currency: USD

    - type: invoice_pdf
      ref: test_corpus/synthetic/invoices/P002_INV_2026-04-27_001.pdf
      ground_truth_fields:
        invoice_number: INV-2026-04-27-MAPLE-001
        po_reference: PO-2026-04-00501
        vendor_id: P002
        total_usd: 3300.00
        currency: USD
      ground_truth_note: |
        Three invoices, same PO, three consecutive days, totalling $12,000 against
        an $8,500 PO. Each individually below typical fraud-flag threshold but
        the pattern is the signal.

expected:
  classification:
    class_label: fraud_signal
    min_confidence: 0.80
    must_contain_evidence:
      - multiple_invoices_same_po
      - short_time_window
      - cumulative_exceeds_po_authorization
      - pattern_consistent_with_split_invoice

  recommendation:
    action: escalate_to_fraud
    rationale_must_mention:
      - 3 invoices on same PO
      - 3 consecutive days
      - totaling $12,000 vs PO of $8,500
      - split-invoice pattern
    counterfactual_should_exist: true

  hitl:
    tier: 3
    routed_to: ap_supervisor + fraud_team
    must_include_in_payload:
      - all_three_invoices_with_extraction
      - the_po_record
      - the_recommendation
      - timeline_visualization
      - cumulative_amount_chart

  drafting:
    must_produce_draft: true
    draft_type: internal_fraud_escalation
    draft_recipient: ap_supervisor + fraud_team
    draft_content_must_mention:
      - PO-2026-04-00501
      - three invoices
      - $12,000 cumulative
      - $8,500 authorized
      - hold ALL three pending review

  execution:
    must_not_post_any_invoice_before_approval: true
    must_create_audit_record: true
    must_flag_fraud_signal: true

  stage9:
    auto_pass: false
    cost_per_case_usd_max: 0.75   # higher — multi-doc reasoning
    time_to_recommendation_p95_seconds_max: 120

pass_criteria:
  - classification.class_label == fraud_signal
  - recommendation.action == escalate_to_fraud
  - hitl.tier == 3
  - drafting.draft_produced == true
  - execution.any_invoice_posted == false
  - execution.fraud_signal_flagged == true
