# -----------------------------------------------------------------------------
# Quality gates (used by `scripts/refresh_model_defaults.py`)
# A model becomes a default only when it clears all gates on its task.
# -----------------------------------------------------------------------------

quality_gates:
  golden_accuracy_min: 0.80      # ≥ 80% of closed-model baseline accuracy
  p95_latency_multiplier_max: 2  # ≤ 2× closed-model baseline latency
  json_validity_min: 0.95        # ≥ 95% valid structured output
  citation_accuracy_min: 0.90    # ≥ 90% citation accuracy (RAG tasks)
